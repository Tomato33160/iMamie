<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Les messages de Tom</title>
    
    <link rel="apple-touch-icon" href="icone.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #fff9fb;
            --card-bg: #ffffff;
            --text-color: #4a4a4a;
            --accent-color: #ff8fa3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #d63384;
            text-align: center;
        }

        .promise {
            font-size: 1rem;
            color: #884d6d;
            background: #ffeef2;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
            border: 1px dashed #ff8fa3;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 450px;
        }

        button {
            aspect-ratio: 1 / 1;
            background: var(--card-bg);
            border: none;
            border-radius: 35px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.9);
            background-color: #fff0f3;
        }

        .emoji {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
        }

        #hint {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>

    <h1>Coucou Mamie !❤️</h1>
    
    <div class="promise">
        Je vais essayer de te refaire 4 nouveaux messages par semaine, donc garde des provisions de mots !
    </div>

    <div class="subtitle">Appuie sur un bouton pour m'écouter :</div>

    <div class="grid">
        <button onclick="play('matin.m4a')">
            <span class="emoji">☀️</span>
            <span class="label">Bonjour</span>
        </button>

        <button onclick="play('blague.m4a')">
            <span class="emoji">😂</span>
            <span class="label">Blague</span>
        </button>

        <button onclick="play('souvenir.m4a')">
            <span class="emoji">💭</span>
            <span class="label">Souvenir</span>
        </button>

        <button onclick="play('calin.m4a')">
            <span class="emoji">🧸</span>
            <span class="label">Gros Bisou</span>
        </button>
    </div>

    <p id="hint">Fait avec amour par ton petit-fils Tom</p>

    <script>
        let currentAudio = null;

        function play(file) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            currentAudio = new Audio(file);
            
            currentAudio.play().catch(error => {
                alert("Appuie une fois sur l'écran pour activer le son !");
            });
        }
    </script>

</body>
</html>
